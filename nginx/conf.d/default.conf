# HTTP → HTTPS リダイレクト（Let's Encrypt の認証も通す）
server {
  listen 80;
  server_name teracode6.zenpoji.or.jp;

  # Let's Encrypt 認証用
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl;
  http2 on;
  server_name teracode6.zenpoji.or.jp;

  # Let's Encrypt 証明書
  ssl_certificate     /etc/letsencrypt/live/teracode6.zenpoji.or.jp/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/teracode6.zenpoji.or.jp/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ファイル名にハッシュが付くため長期キャッシュ可。HTML が古いままだと ChunkLoadError の原因になる。
  location ^~ /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # MDB ファイルアップロード等に対応（デフォルト 1MB → 50MB）
  client_max_body_size 50m;

  # HTML / RSC / API はキャッシュさせない（デプロイ後も古いチャンク参照を防ぐ）
  location / {
    proxy_pass http://127.0.0.1:3000;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
