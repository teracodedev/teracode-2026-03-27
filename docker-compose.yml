services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teracode
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: teracode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # nginx はホストのネットワークで 80/443 を直接掴む（ports: の二重公開はしない）。
  # 「Bind for 0.0.0.0:80 failed: port is already allocated」→ 古い nginx 等が 80 を占有している。
  #   sudo docker ps --format '{{.Names}}\t{{.Ports}}' | grep -E ':80->|:443->'
  #   sudo docker stop <該当コンテナ名>
  #   sudo docker compose up -d --force-recreate nginx
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  # 常駐させない（renew ループは cron が担当）。取得・更新は scripts/renew-ssl.sh または nginx/init-cert.sh。
  # standalone 方式は nginx が 80 番を掴んでいるため失敗するので使わない。
  certbot:
    image: certbot/certbot:latest
    profiles: ["manual"]
    volumes:
      - certbot-webroot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt

volumes:
  certbot-webroot:
  pgdata:
